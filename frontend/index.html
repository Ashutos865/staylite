<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>StayLite — Book Hotels Online | Best Prices Guaranteed</title>
    <meta name="description" content="Discover and book the best hotels at the best prices on StayLite. Instant confirmation, secure online payment via Cashfree, and hassle-free check-in." />
    <meta name="keywords" content="hotel booking, book hotel online, hotel reservation, StayLite, best hotel prices, online hotel booking India" />
    <meta name="author" content="StayLite" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://staylite.in/book" />

    <!-- Open Graph (Facebook / WhatsApp / LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="StayLite" />
    <meta property="og:title" content="StayLite — Book Hotels Online | Best Prices Guaranteed" />
    <meta property="og:description" content="Find and book the perfect hotel for your trip. Easy online booking, instant confirmation, and secure payment." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1566073771259-6a8506099945?w=1200&q=85" />
    <meta property="og:url" content="https://staylite.in/book" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="StayLite — Book Hotels Online" />
    <meta name="twitter:description" content="Find and book the perfect hotel. Easy, fast, and secure." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1566073771259-6a8506099945?w=1200&q=85" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "StayLite",
      "url": "https://staylite.in",
      "description": "Hotel booking platform offering the best prices and instant confirmation.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "support@staylite.in"
      }
    }
    </script>

    <!-- Structured Data: WebSite (enables sitelinks searchbox) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "StayLite",
      "url": "https://staylite.in",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://staylite.in/book?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Performance hints -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://sdk.cashfree.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
